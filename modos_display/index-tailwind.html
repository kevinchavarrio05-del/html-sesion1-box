<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    
     <h1>inline: </h1>
    <div class="inline bg-gray-600 text-white">
        Productos
    </div>

    <div class="inline bg-gray-200 text-white">
        Nosotros
    </div>

     <div class="inline bg-gray-300 text-white">
        Servicios
    </div>

     <div class="inline bg-rose-300 text-white">
        Contacto
    </div>

    <hr/>

    <h1>Block:</h1>

    <div class="block bg-red-600 text-black w-[300px] h-[100px]">
        Productos
    </div>

    <div class="block bg-blue-500 text-black w-[300px] h-[100px]">
        Nosotros
    </div>

    <div class="block bg-gray-200 text-black w-[300px] h-[100px]">
        Servicios
    </div>

    <div class="block bg-blue-400 text-black w-[300px] h-[100px]">
        Contacto
    </div>
</body>
</html>
