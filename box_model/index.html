<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;

        }


        .padre{
            width: 500px;
            height: auto;
            background-color: aqua;
            display: block;
            margin: 0px auto 40px auto;
            padding-top: 20px;
            box-shadow: 0px 10px 13px -7px #000000, -4px 23px 16px 27px rgba(0,0,0,0.43);
            padding-bottom: 20px;

        }

        .hijo{
            margin: 40px auto 40px auto;
            width: 200px;
            height: 200px;
            background-color: red;
            display: block;
            padding: 20px 30px 5px 10px;
            border-top: 10px double rgb(182, 200, 20) ;
            border-right: 5px dashed rgb(128, 20, 200);
            border-bottom: 3px solid rgb(170, 20, 200);
            border-left: 5px solid rgba(41, 7, 233, 0.911);
            border-bottom-left-radius: 15px;
            border-radius: 50%;
        }

        .hijo2{
            margin-top: -100px;

        }
    </style>
</head>
<body>
    <div class="padre">
        <div class="hijo">
            Hijo 1
        </div>
        <div class="hijo hijo2">
            Hijo 2
        </div>
    </div>
</body>
</html>
