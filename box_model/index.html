<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .padre{
            width: 500px;
            height: 400px;
            background-color: aqua;
            display: block;

        }

        .hijo{
            width: 200px;
            height: 200px;
            background-color: red;
            display: block;
            padding: 20px 30px 5px 10px;
            border-top: 10px double rgb(182, 200, 20) ;
            border-right: 5px dashed rgb(128, 20, 200);
            border-bottom: 3px solid rgb(170, 20, 200);
            border-left: 5px solid rgba(41, 7, 233, 0.911);
        }
    </style>
</head>
<body>
    <div class="padre">
        <div class="hijo">
            Hijo
        </div>
    </div>
</body>
</html>
